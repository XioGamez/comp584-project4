<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Calculator App</title>
    <!-- import the webpage's stylesheet -->
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div class="wrapper">
        <section class="calculator-screen">
            <div id="screen" class="screen">0</div>
        </section>

        <section class="calculator-buttons">
            <button class="clear" data-action="clear">C</button>
            <button class="backspace" data-action="backspace">←</button>
            <button class="operator" data-value="÷">÷</button>

            <button class="number" data-value="7">7</button>
            <button class="number" data-value="8">8</button>
            <button class="number" data-value="9">9</button>
            <button class="operator" data-value="x">x</button>

            <button class="number" data-value="4">4</button>
            <button class="number" data-value="5">5</button>
            <button class="number" data-value="6">6</button>
            <button class="operator" data-value="-">−</button>

            <button class="number" data-value="1">1</button>
            <button class="number" data-value="2">2</button>
            <button class="number" data-value="3">3</button>
            <button class="operator" data-value="+">+</button>

            <button class="number zero" data-value="0">0</button>
            <button class="equal" data-action="equals">=</button>
        </section>
    </div>

    <script src="/script.js"></script>
  </body>
</html>
